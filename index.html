<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Le Hong Phat | Data Engineer Portfolio</title>

  <!-- SEO Meta Tags -->
  <meta name="description"
    content="Professional portfolio of Le Hong Phat, a Data Engineer specializing in real-time streaming architectures (Kafka, Debezium), high-performance OLAP databases (ClickHouse), and query federation (Trino)." />
  <meta name="keywords"
    content="Le Hong Phat, Data Engineer, Portfolio, ClickHouse, Kafka, Trino, Debezium, dbt, Apache Airflow, Lakehouse, Apache Iceberg, Vietnam" />
  <meta name="author" content="Le Hong Phat" />

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Le Hong Phat | Data Engineer Portfolio" />
  <meta property="og:description"
    content="Professional portfolio of Le Hong Phat, a Data Engineer specializing in real-time streaming architectures (Kafka, Debezium), high-performance OLAP databases (ClickHouse), and query federation (Trino)." />
  <meta property="og:image" content="https://github.com/phatle224.png" />

  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image" />
  <meta property="twitter:title" content="Le Hong Phat | Data Engineer Portfolio" />
  <meta property="twitter:description"
    content="Professional portfolio of Le Hong Phat, a Data Engineer specializing in real-time streaming architectures (Kafka, Debezium), high-performance OLAP databases (ClickHouse), and query federation (Trino)." />

  <!-- Preconnect Google Fonts for performance -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  
  <script>
    (function () {
      const savedTheme = localStorage.getItem('portfolio-theme');
      if (savedTheme === 'light' || savedTheme === 'dark') {
        document.documentElement.setAttribute('data-theme', savedTheme);
      } else {
        document.documentElement.setAttribute('data-theme', 'light');
      }
    })();
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
